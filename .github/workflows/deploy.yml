name: Deploy web-portofolio

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "static/**"
      - "package.json"
      - "package-lock.json"
      - "svelte.config.js"
      - "vite.config.ts"
      - "tsconfig.json"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        working-directory: /home/ubuntu/projects/web-portofolio
        run: |
          set -e
          git fetch origin
          git reset --hard origin/main
          echo "✅ Code updated to $(git rev-parse --short HEAD)"

      - name: Install dependencies
        working-directory: /home/ubuntu/projects/web-portofolio
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          npm install
          echo "✅ Dependencies installed"

      - name: Build
        working-directory: /home/ubuntu/projects/web-portofolio
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          npm run build
          echo "✅ Built"

      - name: Restart PM2
        run: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          export PATH="$HOME/.local/bin:$PATH"
          pm2 restart web-portofolio
          pm2 save
          echo "✅ Deployed successfully"
